name: CVPR NTIRE Daily Research

on:
  workflow_dispatch:
  schedule:
    # 08:00 Asia/Shanghai
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade openai

      - name: Run research task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.2
          OPENAI_REASONING_EFFORT: medium
        run: python automations/scripts/run_research_task.py cvpr-ntire

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cvpr-ntire-report
          path: automations/reports/**/*.md
          if-no-files-found: error

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automations/reports
          git diff --cached --quiet || git commit -m "Add CVPR NTIRE daily report"
          git push
